database_path: "data/stock_daily.duckdb"
start_date: "2018-01-01"
update_time: "18:30"
timezone: "Asia/Shanghai"

retry_interval_minutes: 5
retry_delays_seconds: [3, 30, 120]
max_retries: 12
session_max_minutes: 30
session_max_requests: 500
initial_import_batch_size: 100
factor_epsilon: 1.0e-10

flight_host: "127.0.0.1"
flight_port: 8815
query_max_rows: 5000000
query_max_sql_length: 100000
duckdb_threads: 4

runtime_dir: "runtime"
log_path: "logs/qstockdataserver.log"
error_log_path: "logs/qstockdataserver.error.log"
log_level: "INFO"
log_max_bytes: 10485760
log_backup_count: 10
